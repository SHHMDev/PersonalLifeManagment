name: Android SDK + Emulator

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Setup Android SDK root
        shell: pwsh
        run: |
          $sdkRoot = "C:\Android\SDK"
          $toolsZip = "cmdline.zip"

          Remove-Item "C:\Android" -Recurse -Force -ErrorAction SilentlyContinue

          New-Item -ItemType Directory -Path $sdkRoot -Force | Out-Null

      - name: Download cmdline tools
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://dl.google.com/android/repository/commandlinetools-win-14742923_latest.zip" `
            -OutFile cmdline.zip

      - name: Extract cmdline tools
        shell: pwsh
        run: |
          Expand-Archive cmdline.zip -DestinationPath C:\Android\tmp

          New-Item -ItemType Directory -Path C:\Android\SDK\cmdline-tools\latest -Force | Out-Null

          Move-Item C:\Android\tmp\cmdline-tools\* C:\Android\SDK\cmdline-tools\latest\ -Force

          Remove-Item C:\Android\tmp -Recurse -Force

      - name: Install SDK packages
        shell: pwsh
        run: |
          $sdkRoot = "C:\Android\SDK"
          $sdk = "$sdkRoot\cmdline-tools\latest\bin\sdkmanager.bat"

          cmd /c "echo y | $sdk --sdk_root=$sdkRoot --licenses"

          cmd /c "$sdk --sdk_root=$sdkRoot platform-tools"
          cmd /c "$sdk --sdk_root=$sdkRoot platforms;android-35"
          cmd /c "$sdk --sdk_root=$sdkRoot build-tools;35.0.0"
          cmd /c "$sdk --sdk_root=$sdkRoot emulator"
          cmd /c "$sdk --sdk_root=$sdkRoot system-images;android-35;google_apis;x86_64"

      - name: Create AVD
        shell: pwsh
        run: |
          echo no | C:\Android\SDK\cmdline-tools\latest\bin\avdmanager.bat create avd `
            -n pixel_api35 `
            -k "system-images;android-35;google_apis;x86_64"

      - name: Zip SDK
        shell: pwsh
        run: |
          Compress-Archive -Path C:\Android\SDK\* -DestinationPath android-sdk-emulator.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-sdk-emulator
          path: android-sdk-emulator.zip
