name: Android SDK + Emulator Setup

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Create Android folder (safe)
      - name: Setup Android directory
        shell: pwsh
        run: |
          if (!(Test-Path "C:\Android")) {
            New-Item -ItemType Directory -Path "C:\Android"
          }

      # 2. Download cmdline tools
      - name: Download Android cmdline tools
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://dl.google.com/android/repository/commandlinetools-win-14742923_latest.zip" `
            -OutFile "cmdline.zip"

          Expand-Archive cmdline.zip -DestinationPath C:\Android

          # rename to correct structure
          if (!(Test-Path "C:\Android\cmdline-tools\latest")) {
            New-Item -ItemType Directory -Path "C:\Android\cmdline-tools\latest" -Force
          }

          Move-Item C:\Android\cmdline-tools\bin C:\Android\cmdline-tools\latest\bin -Force

      # 3. Install SDK packages
      - name: Install SDK components
        shell: pwsh
        run: |
          $sdk = "C:\Android\cmdline-tools\latest\bin\sdkmanager.bat"

          # accept licenses
          cmd /c "echo y | $sdk --sdk_root=C:\Android --licenses"

          # install core packages
          cmd /c "$sdk --sdk_root=C:\Android platform-tools"
          cmd /c "$sdk --sdk_root=C:\Android platforms;android-35"
          cmd /c "$sdk --sdk_root=C:\Android build-tools;35.0.0"
          cmd /c "$sdk --sdk_root=C:\Android emulator"
          cmd /c "$sdk --sdk_root=C:\Android system-images;android-35;google_apis;x86_64"

      # 4. Create AVD
      - name: Create Emulator (AVD)
        shell: pwsh
        run: |
          echo no | C:\Android\cmdline-tools\latest\bin\avdmanager.bat create avd `
            -n pixel_api35 `
            -k "system-images;android-35;google_apis;x86_64"

      # 5. Zip SDK
      - name: Create SDK archive
        shell: pwsh
        run: |
          Compress-Archive -Path C:\Android\* -DestinationPath android-sdk-emulator.zip

      # 6. Upload artifact
      - name: Upload SDK
        uses: actions/upload-artifact@v4
        with:
          name: android-sdk-emulator
          path: android-sdk-emulator.zip
