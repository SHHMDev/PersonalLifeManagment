name: Android SDK + Emulator

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1) پاک‌سازی و آماده‌سازی
      - name: Clean environment
        shell: pwsh
        run: |
          Remove-Item "C:\Android" -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path "C:\Android\SDK" -Force | Out-Null

      # 2) دانلود cmdline-tools
      - name: Download Android cmdline-tools
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://dl.google.com/android/repository/commandlinetools-win-14742923_latest.zip" `
            -OutFile "cmdline.zip"

      # 3) اکسترکت cmdline-tools در ساختار صحیح
      - name: Extract cmdline-tools
        shell: pwsh
        run: |
          Expand-Archive cmdline.zip -DestinationPath "C:\Android\tmp"

          New-Item -ItemType Directory -Path "C:\Android\SDK\cmdline-tools" -Force | Out-Null
          Move-Item "C:\Android\tmp\cmdline-tools" "C:\Android\SDK\cmdline-tools\latest"

          Remove-Item "C:\Android\tmp" -Recurse -Force
          Remove-Item "cmdline.zip"

      # 4) تنظیم ANDROID_SDK_ROOT برای همهٔ استپ‌های بعدی
      - name: Set ANDROID_SDK_ROOT
        shell: pwsh
        run: |
          echo "ANDROID_SDK_ROOT=C:\Android\SDK" | Out-File -FilePath $env:GITHUB_ENV -Append

      # 5) نصب پکیج‌های SDK
      - name: Install SDK packages
        shell: pwsh
        run: |
          $sdkRoot = $env:ANDROID_SDK_ROOT
          $sdk = "$sdkRoot\cmdline-tools\latest\bin\sdkmanager.bat"

          # قبول کردن لایسنس‌ها
          cmd /c "echo y | $sdk --sdk_root=$sdkRoot --licenses"

          # آپدیت کلی
          cmd /c "$sdk --sdk_root=$sdkRoot --update"

          # پکیج‌های اصلی
          cmd /c "$sdk --sdk_root=$sdkRoot `"platform-tools`""
          cmd /c "$sdk --sdk_root=$sdkRoot `"platforms;android-35`""
          cmd /c "$sdk --sdk_root=$sdkRoot `"build-tools;35.0.0`""
          cmd /c "$sdk --sdk_root=$sdkRoot `"emulator`""

          # system image مورد نیاز برای AVD
          cmd /c "$sdk --sdk_root=$sdkRoot --channel=0 `"system-images;android-35;google_apis;x86_64`""

      # 6) بررسی نصب system-image و نمایش مسیر
      - name: Verify system image on disk
        shell: pwsh
        run: |
          $sdkRoot = $env:ANDROID_SDK_ROOT
          $sysImgPath = Join-Path $sdkRoot "system-images\android-35\google_apis\x86_64"

          Write-Host "Checking system image path: $sysImgPath"
          if (-Not (Test-Path $sysImgPath)) {
            Write-Error "System image directory not found: $sysImgPath"
          }

          Get-ChildItem -Recurse $sysImgPath

      # 7) لیست پکیج‌های نصب‌شده
      - name: List installed SDK packages
        shell: pwsh
        run: |
          $sdkRoot = $env:ANDROID_SDK_ROOT
          & "$sdkRoot\cmdline-tools\latest\bin\sdkmanager.bat" --sdk_root=$sdkRoot --list_installed

      # 8) ساخت AVD بدون استفاده از --sdk_root
      - name: Create AVD
        shell: pwsh
        run: |
          $sdkRoot = $env:ANDROID_SDK_ROOT
          $avd = "$sdkRoot\cmdline-tools\latest\bin\avdmanager.bat"

          # برای جلوگیری از خطای "device with this name already exists"
          & $avd list avd
          & $avd delete avd -n pixel_api35 2>$null || Write-Host "No previous AVD named pixel_api35"

          # ساخت AVD (بدون --sdk_root، چون ساپورت نمی‌شود)
          cmd /c "echo no | `"$avd`" create avd -n pixel_api35 -k `"system-images;android-35;google_apis;x86_64`""

      # 9) تأیید AVD ساخته‌شده
      - name: Verify AVD
        shell: pwsh
        run: |
          $sdkRoot = $env:ANDROID_SDK_ROOT
          & "$sdkRoot\cmdline-tools\latest\bin\avdmanager.bat" list avd

      # 10) زیپ کردن کل SDK
      - name: Zip Android SDK
        shell: pwsh
        run: |
          $sdkRoot = $env:ANDROID_SDK_ROOT
          Compress-Archive `
            -Path "$sdkRoot\*" `
            -DestinationPath "android-sdk-emulator.zip"

      # 11) آپلود artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-sdk-emulator
          path: android-sdk-emulator.zip
